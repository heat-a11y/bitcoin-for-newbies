name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "SDK_ROOT=$SDK_ROOT"

          # Accept all SDK licenses
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses \
            || yes | "$SDK_ROOT/tools/bin/sdkmanager" --licenses \
            || echo "WARN: could not accept licenses"

          # Install required platform + build-tools
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>&1 \
            || yes | "$SDK_ROOT/tools/bin/sdkmanager" \
              "platforms;android-35" \
              "build-tools;35.0.0" 2>&1 \
            || echo "WARN: sdkmanager install failed"

          echo "--- Installed SDK packages ---"
          "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --list --include_installed 2>/dev/null \
            || "$SDK_ROOT/tools/bin/sdkmanager" --list --include_installed 2>/dev/null \
            || true

      - name: Generate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-widget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload to Release (if triggered by a published release)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: BitcoinWidget-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
